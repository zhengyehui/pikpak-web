<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PikPak Storage Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1e2e, #2d1b69);
            padding: 24px 32px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #30363d;
        }
        .header h1 {
            font-size: 22px; font-weight: 600;
            background: linear-gradient(90deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .controls { display: flex; gap: 12px; align-items: center; }
        .btn {
            padding: 8px 20px; border: none; border-radius: 8px;
            font-size: 14px; cursor: pointer; font-weight: 500; transition: all 0.2s;
        }
        .btn-primary { background: linear-gradient(135deg, #238636, #2ea043); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-danger { background: linear-gradient(135deg, #da3633, #f85149); color: white; }
        .btn-secondary { background: #30363d; color: #c9d1d9; border: 1px solid #484f58; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .status-bar {
            background: #161b22; padding: 12px 32px;
            display: flex; align-items: center; gap: 24px;
            font-size: 13px; color: #8b949e; border-bottom: 1px solid #21262d;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-dot.idle { background: #484f58; }
        .status-dot.scanning { background: #3fb950; animation: pulse 1.5s infinite; }
        .status-dot.error { background: #f85149; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .progress-bar { flex: 1; height: 4px; background: #21262d; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #58a6ff, #bc8cff); transition: width 0.3s; width: 0%; }

        .dashboard { padding: 24px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 20px; }
        .card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #c9d1d9; display: flex; align-items: center; gap: 10px; }
        .chart-container { width: 100%; height: 350px; }
        .card-full { grid-column: 1 / -1; }

        .file-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .file-table th {
            text-align: left; padding: 8px 12px; background: #0d1117;
            color: #8b949e; font-weight: 500; position: sticky; top: 0; z-index: 1;
        }
        .file-table td { padding: 8px 12px; border-top: 1px solid #21262d; color: #c9d1d9; }
        .file-table tr:hover td { background: #1c2128; }
        .table-wrapper { max-height: 500px; overflow-y: auto; }
        .path-cell { max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #8b949e; }
        .size-cell { font-family: 'SF Mono', monospace; color: #58a6ff; white-space: nowrap; }

        .summary { display: flex; gap: 16px; padding: 0 32px 0; }
        .summary-card {
            background: #161b22; border: 1px solid #21262d; border-radius: 10px;
            padding: 16px 24px; flex: 1; text-align: center;
        }
        .summary-value {
            font-size: 28px; font-weight: 700;
            background: linear-gradient(90deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .summary-label { font-size: 12px; color: #8b949e; margin-top: 4px; }
        .log-area { padding: 8px 32px; font-size: 12px; color: #484f58; max-height: 24px; overflow: hidden; }

        /* Breadcrumb */
        .breadcrumb { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .breadcrumb a {
            color: #58a6ff; text-decoration: none; font-size: 13px; cursor: pointer;
        }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb span { color: #484f58; font-size: 13px; }
        .breadcrumb .current { color: #c9d1d9; font-size: 13px; font-weight: 600; }

        /* Size bar in table */
        .size-bar-bg {
            background: #21262d; border-radius: 3px; height: 6px; width: 120px; display: inline-block; vertical-align: middle; margin-left: 8px;
        }
        .size-bar-fill {
            height: 100%; border-radius: 3px;
            background: linear-gradient(90deg, #58a6ff, #bc8cff);
        }

        /* Clickable folder row */
        .folder-row { cursor: pointer; }
        .folder-row td:first-child::before { content: '📁 '; }
        .file-row td:first-child::before { content: '📄 '; }

        /* Tab switcher */
        .tab-bar { display: flex; gap: 0; margin-bottom: 16px; }
        .tab-btn {
            padding: 8px 20px; background: transparent; border: 1px solid #30363d;
            color: #8b949e; cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        .tab-btn:first-child { border-radius: 8px 0 0 8px; }
        .tab-btn:last-child { border-radius: 0 8px 8px 0; }
        .tab-btn.active { background: #21262d; color: #58a6ff; border-color: #58a6ff; }
    </style>
</head>
<body>
    <div class="header">
        <h1>PikPak Storage Analyzer</h1>
        <div class="controls">
            <button class="btn btn-primary" id="btnScan" onclick="startScan(false)">开始扫描</button>
            <button class="btn btn-danger" id="btnStop" onclick="stopScan()" disabled>停止</button>
            <button class="btn btn-secondary" onclick="startScan(true)">全量重扫</button>
            <button class="btn btn-secondary" onclick="loadStats()">刷新图表</button>
        </div>
    </div>

    <div class="status-bar">
        <span><span class="status-dot idle" id="statusDot"></span><span id="statusText">就绪</span></span>
        <span id="fileCount">文件: -</span>
        <span id="folderCount">目录: -</span>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="log-area" id="logArea"></div>

    <div class="summary" style="margin-top:20px;">
        <div class="summary-card"><div class="summary-value" id="totalFiles">-</div><div class="summary-label">总文件数</div></div>
        <div class="summary-card"><div class="summary-value" id="totalSize">-</div><div class="summary-label">总大小</div></div>
        <div class="summary-card"><div class="summary-value" id="avgSize">-</div><div class="summary-label">平均文件大小</div></div>
        <div class="summary-card"><div class="summary-value" id="largestFile">-</div><div class="summary-label">最大文件</div></div>
    </div>

    <div class="dashboard">
        <!-- Treemap with drill-down -->
        <div class="card card-full">
            <div class="card-title">
                目录空间占用（点击下钻）
            </div>
            <div class="breadcrumb" id="breadcrumb"></div>
            <div id="treemapChart" style="width:100%;height:500px;margin-top:12px;"></div>
        </div>

        <!-- Directory ranking -->
        <div class="card card-full">
            <div class="card-title">空间占用排行（所有层级）</div>
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchRankTab('folders', this)">目录排行</button>
                <button class="tab-btn" onclick="switchRankTab('files', this)">文件排行</button>
            </div>
            <div class="table-wrapper" id="rankTableWrapper">
                <table class="file-table">
                    <thead id="rankTableHead"></thead>
                    <tbody id="rankTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <div class="card-title">文件大小分布</div>
            <div class="chart-container" id="sizeChart"></div>
        </div>
        <div class="card">
            <div class="card-title">文件类型占比</div>
            <div class="chart-container" id="typeChart"></div>
        </div>
    </div>

<script>
// ========== Utils ==========
function formatSize(bytes) {
    if (!bytes || bytes === 0) return '0 B';
    const units = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(bytes) / Math.log(1024));
    return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
}
function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ========== Charts ==========
const sizeChart = echarts.init(document.getElementById('sizeChart'));
const typeChart = echarts.init(document.getElementById('typeChart'));
const treemapChart = echarts.init(document.getElementById('treemapChart'));

window.addEventListener('resize', () => { sizeChart.resize(); typeChart.resize(); treemapChart.resize(); });

const TREEMAP_COLORS = [
    '#f85149','#58a6ff','#3fb950','#d29922','#bc8cff','#da7756',
    '#79c0ff','#7ee787','#e3b341','#d2a8ff','#ffa657','#56d4dd',
    '#ff7b72','#a5d6ff','#aff5b4','#f2cc60','#d8b4fe','#ffa198'
];

// ========== Treemap Drill-Down ==========
let treemapHistory = []; // [{id, name}]
let currentTreemapData = null;

async function loadTreemap(parentId = '') {
    const res = await fetch(`/api/stats/treemap?parent_id=${encodeURIComponent(parentId)}`).then(r => r.json());
    currentTreemapData = res;
    renderTreemap(res);
    updateBreadcrumb();
}

function renderTreemap(data) {
    if (!data.children || data.children.length === 0) {
        treemapChart.clear();
        return;
    }

    const maxVal = Math.max(...data.children.map(c => c.value));

    treemapChart.setOption({
        tooltip: {
            formatter: p => {
                const d = p.data;
                return `<b>${escapeHtml(d.rawName || d.name)}</b><br/>` +
                       `大小: ${formatSize(d.value)}<br/>` +
                       `文件数: ${(d.file_count || 0).toLocaleString()}` +
                       (d.has_children ? '<br/><i style="color:#8b949e">点击下钻</i>' : '');
            }
        },
        series: [{
            type: 'treemap',
            data: data.children.map((c, i) => ({
                name: `${c.name}\n${formatSize(c.value)}`,
                rawName: c.name,
                value: c.value,
                file_count: c.file_count,
                has_children: c.has_children,
                folderId: c.id,
                itemStyle: { color: TREEMAP_COLORS[i % TREEMAP_COLORS.length] },
            })),
            width: '100%',
            height: '100%',
            roam: false,
            nodeClick: false,
            breadcrumb: { show: false },
            label: {
                show: true,
                formatter: p => p.name,
                fontSize: 13,
                color: '#fff',
                textShadowColor: 'rgba(0,0,0,0.5)',
                textShadowBlur: 4,
            },
            itemStyle: { borderColor: '#161b22', borderWidth: 2, gapWidth: 2 },
        }]
    }, true);

    // Click handler for drill-down
    treemapChart.off('click');
    treemapChart.on('click', (params) => {
        const d = params.data;
        if (d && d.has_children && d.folderId && d.folderId !== '__files__') {
            treemapHistory.push({ id: d.folderId, name: d.rawName });
            loadTreemap(d.folderId);
        }
    });
}

function updateBreadcrumb() {
    const el = document.getElementById('breadcrumb');
    let html = `<a onclick="navigateTreemap(-1)">PikPak</a>`;
    for (let i = 0; i < treemapHistory.length; i++) {
        html += `<span>/</span>`;
        if (i < treemapHistory.length - 1) {
            html += `<a onclick="navigateTreemap(${i})">${escapeHtml(treemapHistory[i].name)}</a>`;
        } else {
            html += `<span class="current">${escapeHtml(treemapHistory[i].name)}</span>`;
        }
    }
    el.innerHTML = html;
}

function navigateTreemap(index) {
    if (index === -1) {
        treemapHistory = [];
        loadTreemap('');
    } else {
        const target = treemapHistory[index];
        treemapHistory = treemapHistory.slice(0, index + 1);
        loadTreemap(target.id);
    }
}

// ========== Ranking Table ==========
let rankMode = 'folders';
let topFoldersData = null;
let topFilesData = null;

function switchRankTab(mode, btn) {
    rankMode = mode;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderRankTable();
}

async function loadRankData() {
    const [foldersRes, filesRes] = await Promise.all([
        fetch('/api/stats/top-folders?limit=100').then(r => r.json()),
        fetch('/api/stats/top-files?limit=100').then(r => r.json()),
    ]);
    topFoldersData = foldersRes;
    topFilesData = filesRes;
    renderRankTable();
}

function renderRankTable() {
    const head = document.getElementById('rankTableHead');
    const body = document.getElementById('rankTableBody');

    if (rankMode === 'folders') {
        const maxSize = topFoldersData && topFoldersData.length > 0 ? topFoldersData[0].size : 1;
        head.innerHTML = `<tr><th style="width:50px">#</th><th>目录名</th><th style="width:160px">大小</th><th>占比</th><th style="width:100px">文件数</th><th>路径</th></tr>`;
        body.innerHTML = (topFoldersData || []).map((f, i) => {
            const pct = (f.size / maxSize * 100).toFixed(1);
            return `<tr class="folder-row" onclick="drillToFolder('${f.id}','${escapeHtml(f.name)}')">
                <td>${i + 1}</td>
                <td>${escapeHtml(f.name)}</td>
                <td class="size-cell">${formatSize(f.size)}</td>
                <td><div class="size-bar-bg"><div class="size-bar-fill" style="width:${pct}%"></div></div></td>
                <td>${f.file_count.toLocaleString()}</td>
                <td class="path-cell" title="${escapeHtml(f.path)}">${escapeHtml(f.path)}</td>
            </tr>`;
        }).join('');
    } else {
        const maxSize = topFilesData && topFilesData.length > 0 ? topFilesData[0].size : 1;
        head.innerHTML = `<tr><th style="width:50px">#</th><th>文件名</th><th style="width:160px">大小</th><th>占比</th><th>类型</th><th>路径</th></tr>`;
        body.innerHTML = (topFilesData || []).map((f, i) => {
            const pct = (f.size / maxSize * 100).toFixed(1);
            return `<tr class="file-row">
                <td>${i + 1}</td>
                <td>${escapeHtml(f.name)}</td>
                <td class="size-cell">${formatSize(f.size)}</td>
                <td><div class="size-bar-bg"><div class="size-bar-fill" style="width:${pct}%"></div></div></td>
                <td>${escapeHtml(f.mime_type || '-')}</td>
                <td class="path-cell" title="${escapeHtml(f.path)}">${escapeHtml(f.path)}</td>
            </tr>`;
        }).join('');
    }
}

function drillToFolder(id, name) {
    treemapHistory = [{ id, name }];
    loadTreemap(id);
    // Scroll to treemap
    document.getElementById('treemapChart').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ========== Size / Type Charts ==========
function renderSizeChart(data) {
    sizeChart.setOption({
        tooltip: {
            trigger: 'axis',
            formatter: p => `${p[0].name}<br/>文件数: ${p[0].value.toLocaleString()}<br/>总大小: ${formatSize(p[0].data.totalSize)}`
        },
        xAxis: {
            type: 'category', data: data.map(d => d.label),
            axisLabel: { color: '#8b949e', fontSize: 11 },
            axisLine: { lineStyle: { color: '#30363d' } }
        },
        yAxis: { type: 'value', axisLabel: { color: '#8b949e' }, splitLine: { lineStyle: { color: '#21262d' } } },
        series: [{
            type: 'bar',
            data: data.map(d => ({ value: d.count, totalSize: d.total_size })),
            itemStyle: {
                borderRadius: [4, 4, 0, 0],
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: '#58a6ff' }, { offset: 1, color: '#1f6feb' }
                ])
            }
        }],
        grid: { left: 50, right: 20, top: 20, bottom: 40 }
    });
}

function renderTypeChart(data) {
    typeChart.setOption({
        tooltip: {
            formatter: p => `${p.name}<br/>文件数: ${p.data.count.toLocaleString()}<br/>总大小: ${formatSize(p.data.total_size)}`
        },
        series: [{
            type: 'pie', radius: ['40%', '70%'], avoidLabelOverlap: true,
            itemStyle: { borderRadius: 6, borderColor: '#161b22', borderWidth: 2 },
            label: { color: '#c9d1d9', fontSize: 12 },
            data: data.map(d => ({ name: d.name, value: d.total_size, count: d.count, total_size: d.total_size })),
            color: ['#f85149', '#58a6ff', '#3fb950', '#d29922', '#bc8cff', '#8b949e']
        }]
    });
}

// ========== API ==========
async function loadStats() {
    try {
        const [sizeRes, typeRes, statusRes] = await Promise.all([
            fetch('/api/stats/size-distribution').then(r => r.json()),
            fetch('/api/stats/type-distribution').then(r => r.json()),
            fetch('/api/scan/status').then(r => r.json()),
        ]);

        renderSizeChart(sizeRes);
        renderTypeChart(typeRes);

        const totalFiles = sizeRes.reduce((s, d) => s + d.count, 0);
        const totalSize = sizeRes.reduce((s, d) => s + d.total_size, 0);
        document.getElementById('totalFiles').textContent = totalFiles.toLocaleString();
        document.getElementById('totalSize').textContent = formatSize(totalSize);
        document.getElementById('avgSize').textContent = totalFiles > 0 ? formatSize(totalSize / totalFiles) : '-';
        document.getElementById('fileCount').textContent = `文件: ${statusRes.cached_files}`;
        document.getElementById('folderCount').textContent = `目录: ${statusRes.cached_folders}`;

        // Load treemap and rank data
        await Promise.all([
            loadTreemap(treemapHistory.length > 0 ? treemapHistory[treemapHistory.length - 1].id : ''),
            loadRankData(),
        ]);

        if (topFilesData && topFilesData.length > 0) {
            document.getElementById('largestFile').textContent = formatSize(topFilesData[0].size);
        }
    } catch (e) {
        console.error('Failed to load stats:', e);
    }
}

// ========== Scan Control ==========
async function startScan(fullRescan) {
    document.getElementById('btnScan').disabled = true;
    document.getElementById('btnStop').disabled = false;
    document.getElementById('statusDot').className = 'status-dot scanning';
    document.getElementById('statusText').textContent = '扫描中...';
    await fetch(`/api/scan/start?full_rescan=${fullRescan}`, { method: 'POST' });
    connectWebSocket();
}
async function stopScan() {
    await fetch('/api/scan/stop', { method: 'POST' });
    document.getElementById('statusText').textContent = '正在停止...';
}

// ========== WebSocket ==========
let ws = null;
let refreshTimer = null;

function connectWebSocket() {
    if (ws) ws.close();
    ws = new WebSocket(`ws://${location.host}/ws/scan`);
    ws.onmessage = (e) => {
        const event = JSON.parse(e.data);
        if (event.type === 'progress') {
            document.getElementById('statusText').textContent = `扫描中... ${event.files} 文件 / ${event.folders} 目录`;
            document.getElementById('fileCount').textContent = `文件: ${event.files}`;
            document.getElementById('folderCount').textContent = `目录: ${event.folders}`;
            document.getElementById('logArea').textContent = event.current_path;
            if (!refreshTimer) { refreshTimer = setInterval(loadStats, 30000); }
        } else if (event.type === 'completed') {
            document.getElementById('statusDot').className = 'status-dot idle';
            document.getElementById('statusText').textContent = `扫描完成 - ${event.files} 文件 / ${event.folders} 目录`;
            document.getElementById('btnScan').disabled = false;
            document.getElementById('btnStop').disabled = true;
            document.getElementById('logArea').textContent = '';
            clearInterval(refreshTimer); refreshTimer = null;
            loadStats();
        } else if (event.type === 'error') {
            document.getElementById('statusDot').className = 'status-dot error';
            document.getElementById('logArea').textContent = '错误: ' + event.message;
        }
    };
    ws.onclose = () => { clearInterval(refreshTimer); refreshTimer = null; };
    setInterval(() => { if (ws && ws.readyState === WebSocket.OPEN) ws.send('ping'); }, 30000);
}

// ========== Init ==========
async function init() {
    await loadStats();
    const status = await fetch('/api/scan/status').then(r => r.json());
    if (status.is_scanning) {
        document.getElementById('btnScan').disabled = true;
        document.getElementById('btnStop').disabled = false;
        document.getElementById('statusDot').className = 'status-dot scanning';
        document.getElementById('statusText').textContent = `扫描中... ${status.scanned_files} 文件 / ${status.scanned_folders} 目录`;
        connectWebSocket();
    } else if (status.cached_files > 0) {
        document.getElementById('statusDot').className = 'status-dot idle';
        document.getElementById('statusText').textContent = `缓存 ${status.cached_files} 文件 / ${status.cached_folders} 目录`;
    }
}
init();
</script>
</body>
</html>
